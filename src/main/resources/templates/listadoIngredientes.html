<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ingredientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Ingredientes Disponibles</h1>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cantidad</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="i : ${lista}">
                <td th:text="${i.id}"></td>
                <td th:text="${i.nombre}"></td>
                <td th:text="${i.cantidad}"></td>
            </tr>
        </tbody>
    </table>
    <div class="mt-4">
        <a href="/inicio" class="btn btn-secondary">Volver al inicio</a>
        <a href="/altaIngrediente" class="btn btn-primary">Añadir Ingrediente</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Receta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Nueva Receta</h2>
            <form th:action="@{/altaReceta}" th:object="${receta}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre de la Receta:</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Categoría:</label>
                    <select th:field="*{categoria}" class="form-select">
                        <option value="Principal">Plato Principal</option>
                        <option value="Postre">Postre</option>
                        <option value="Entrante">Entrante</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tiempo (minutos):</label>
                    <input type="number" th:field="*{tiempoPreparacion}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Dificultad:</label>
                    <input type="text" th:field="*{dificultad}" class="form-control" placeholder="Fácil, Media, Difícil">
                </div>
                <button type="submit" class="btn btn-success w-100">Guardar Receta</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Ingrediente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4">Nuevo Ingrediente</h2>
        <form th:action="@{/altaIngrediente}" th:object="${ingrediente}" method="post">
            <div class="mb-3">
                <label class="form-label">Nombre del Ingrediente:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cantidad:</label>
                <input type="text" th:field="*{cantidad}" class="form-control" required placeholder="Ej: 500g, 2 unidades...">
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Guardar Ingrediente</button>
                <a href="/inicio" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
